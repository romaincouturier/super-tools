name: Process Support Ticket

on:
  workflow_dispatch:
    inputs:
      ticket_number:
        description: "Numéro de ticket (ex: ST-2026-0186)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      TICKET_STATUS_URL: ${{ secrets.VITE_SUPABASE_URL }}/functions/v1/update-ticket-coding-status
      TICKET_STATUS_WEBHOOK_SECRET: ${{ secrets.TICKET_STATUS_WEBHOOK_SECRET }}
      TICKET_NUMBER: ${{ inputs.ticket_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config --global user.name "Claude Code"
          git config --global user.email "claude-code[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Mark ticket as running
        # Ne pas faire échouer le job si l'update échoue : le watchdog SQL
        # basculera le ticket en `error` après 60 min. Mais on log clairement
        # le résultat pour diagnostic.
        run: |
          set +e
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "x-webhook-secret: $TICKET_STATUS_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            "$TICKET_STATUS_URL" \
            -d "{\"ticket_number\": \"$TICKET_NUMBER\", \"coding_status\": \"running\", \"coding_error\": null}")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Failed to mark ticket as running (HTTP $STATUS). Watchdog will recover."
          fi

      - name: Process ticket with Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-8
            --allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent
          prompt: |
            Traite le ticket support ${{ inputs.ticket_number }} du kanban supertools.

            Suis exactement les instructions dans .claude/skills/process-ticket/SKILL.md.
            Le numéro de ticket est : ${{ inputs.ticket_number }}

            Variables d'environnement disponibles dans ce contexte :
            - SUPABASE_URL : URL du projet Supabase
            - SUPABASE_SERVICE_ROLE_KEY : clé service role pour l'API REST Supabase
            - GH_TOKEN : GitHub token pour créer des PRs via `gh pr create`

            Pour créer la PR, utilise `gh pr create` via Bash (ne pas utiliser les outils MCP GitHub).
            La branche de base est `main`.

      - name: Mark ticket as error on failure
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          set +e
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "x-webhook-secret: $TICKET_STATUS_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            "$TICKET_STATUS_URL" \
            -d "{\"ticket_number\": \"$TICKET_NUMBER\", \"coding_status\": \"error\", \"coding_error\": \"Workflow GitHub Actions en échec : $RUN_URL\"}")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Failed to mark ticket as error (HTTP $STATUS). Watchdog will recover after 60 min."
          fi
